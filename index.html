<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintetizador Modular Avanzado</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="auth-screen" class="auth-wrapper">
        <div class="auth-card">
            <h2 id="auth-title">Iniciar Sesión</h2>
            <form id="auth-form">
                
                <div id="register-fields" class="hidden">
                    <label>Nombres: <input type="text" id="reg-name" placeholder="Ej. Juan"></label>
                    <label>Apellidos: <input type="text" id="reg-lastname" placeholder="Ej. Pérez"></label>
                    <label>País: <input type="text" id="reg-country" placeholder="Ej. México"></label>
                </div>

                <label>Email: <input type="email" id="auth-email" placeholder="correo@ejemplo.com" required></label>
                <label>Contraseña: <input type="password" id="auth-password" placeholder="******" required></label>
                
                <span id="forgot-pass-btn" class="forgot-text">¿Olvidaste tu contraseña?</span>
                
                <button type="submit" id="auth-btn">Ingresar al Sintetizador</button>
                
                <div class="divider">o</div>
                <button type="button" id="google-btn" class="social-btn">
                    <svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="18px" height="18px" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.7 17.74 9.5 24 9.5z"></path>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                        <path fill="none" d="M0 0h48v48H0z"></path>
                    </svg>
                    Continuar con Google
                </button>
            </form>
            <p class="toggle-text">¿No tienes cuenta? <span id="toggle-auth">Regístrate aquí</span></p>
        </div>
    </div>

    <div id="synth-app" class="hidden">
        <h1>Sintetizador Modular Avanzado</h1>
        
        <div class="rta-container">
            <canvas id="rta-canvas" width="800" height="120"></canvas>
        </div>

        <!-- NUEVO: Controles Maestros -->
        <div class="master-section">
            <label>Volumen Maestro <input type="number" class="val-input" id="master-vol-num" min="0" max="1" step="0.01" value="0.7"></label>
            <input type="range" id="master-vol" min="0" max="1" step="0.01" value="0.7">
        </div>
        
        <div class="synth-rack" id="synth-rack"></div>
        
        <div class="piano-wrapper">
            <div class="piano" id="keyboard"></div>
        </div>
    </div>

    <script type="module" src="auth.js" defer></script>
    <script src="script.js" defer></script>
</body>
</html>
